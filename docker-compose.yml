services:
  postgres:
    image: postgres:18-alpine
    container_name: mayoriza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: mayoriza_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mayoriza-api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.development
    ports:
      - '3001:3001'
    volumes:
      - .:/usr/src/app
      - ./generated:/usr/src/app/generated
      - /usr/src/app/node_modules
    command: sh -c "pnpx prisma generate && pnpm run start:local"

volumes:
  postgres_data:
